name: Kanban Dry Run

on:
  pull_request:
    branches: [main]

env:
  KANBAN_CLI_VERSION: '412255f9b1bc6a3efcfe3116a69bc38447e9cf3f'

jobs:
  kanban-dry-run:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      
      - name: Clone kanban CLI (pinned)
        run: git clone --depth 1 https://github.com/open-hax/openhax.git /tmp/openhax && git -C /tmp/openhax checkout ${{ env.KANBAN_CLI_VERSION }}
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install CLI dependencies
        run: cd /tmp/openhax && pnpm install --filter @openhax/kanban
      
      - name: Build CLI
        run: cd /tmp/openhax && pnpm --filter @openhax/kanban build
      
      - name: Dry-run sync
        run: |
          node /tmp/openhax/packages/kanban/dist/cli.js sync trello \
            --config ussyverse.kanban.json \
            --dry-run
        env:
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_API_TOKEN: ${{ secrets.TRELLO_API_TOKEN }}