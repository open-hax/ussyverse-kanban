name: Trello → main

on:
  repository_dispatch:
    types: [trello_webhook]
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *" # fallback polling (webhooks should make this mostly idle)

permissions:
  contents: write

env:
  KANBAN_CLI_VERSION: 'feature/kanban-package'

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pull from Trello into tasks/
        run: node scripts/trello-pull.mjs --config ussyverse.kanban.json
        env:
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_API_TOKEN: ${{ secrets.TRELLO_API_TOKEN }}

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Trello → main sync"
          git push
